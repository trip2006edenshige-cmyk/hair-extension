<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたに合うエクステ診断</title>

<style>
:root {
  --bg: #f8f1ed;
  --card: #ffffff;
  --main: #9b6b63;
  --main-dark: #7b514a;
  --accent: #d6a59d;
  --soft: #fff8f5;
  --soft-pink: #f2d8d4;
  --border: #e6c8c2;
  --text: #4a3b35;
  --sub: #6b5852;
  --gray: #eee;
  --gold: #c5a46d;
}

* { box-sizing: border-box; }

body {
  font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 20px;
  color: var(--text);
  line-height: 1.7;
}

.container {
  max-width: 780px;
  margin: auto;
}

.card {
  background: var(--card);
  padding: 26px;
  border-radius: 24px;
  box-shadow: 0 8px 24px rgba(120, 80, 70, .12);
}

.hero {
  text-align: center;
  background: linear-gradient(135deg, #fff8f5, #f2d8d4);
  border-radius: 22px;
  padding: 28px 18px;
  margin-bottom: 22px;
}

.hero h1 {
  color: var(--main-dark);
  margin: 0 0 10px;
  font-size: 28px;
  letter-spacing: .04em;
}

.hero p {
  margin: 0;
  color: var(--sub);
  font-size: 14px;
}

.progress-wrap { margin: 22px 0 26px; }

.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--main);
  font-weight: bold;
  margin-bottom: 8px;
}

.progress {
  height: 10px;
  background: var(--gray);
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 20%;
  background: var(--accent);
  border-radius: 999px;
  transition: .3s;
}

.question { display: none; }
.question.active { display: block; }

.question h2 {
  color: #5a403a;
  font-size: 20px;
  margin: 0 0 8px;
}

.question-note {
  font-size: 13px;
  color: var(--main);
  font-weight: bold;
  margin: 0 0 14px;
}

.option-btn, .length-btn {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 15px 14px;
  border: 1px solid #e4c6c0;
  border-radius: 15px;
  background: #fffaf8;
  color: var(--text);
  cursor: pointer;
  font-size: 15px;
  text-align: left;
  transition: .2s;
}

.option-btn:hover, .length-btn:hover { background: #f5ddd8; }

.option-btn.selected, .length-btn.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: bold;
}

.nav {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}

.nav button {
  padding: 13px 16px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
}

.back {
  background: #f1e9e6;
  color: #5a403a;
  flex: 1;
}

.next {
  background: var(--main);
  color: #fff;
  flex: 2;
}

.next:hover { background: #80554e; }

.result {
  display: none;
  margin-top: 26px;
  padding: 24px;
  background: var(--soft);
  border: 2px solid var(--border);
  border-radius: 22px;
}

.result-label {
  text-align: center;
  color: var(--main);
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 6px;
}

.result h2 {
  color: var(--main);
  font-size: 25px;
  text-align: center;
  margin: 0 0 8px;
}

.result-lead {
  text-align: center;
  color: var(--sub);
  font-size: 14px;
  margin: 0 0 18px;
}

.top-answer {
  background: #fff;
  border: 2px solid var(--gold);
  border-radius: 22px;
  padding: 18px;
  margin: 18px 0;
  text-align: center;
  box-shadow: 0 6px 18px rgba(120, 80, 70, .08);
}

.top-answer .mini-label {
  display: inline-block;
  background: var(--gold);
  color: #fff;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 10px;
}

.top-answer strong {
  display: block;
  color: var(--main-dark);
  font-size: 20px;
  margin: 5px 0;
}

.top-answer p {
  margin: 8px 0 0;
  color: var(--sub);
  font-size: 14px;
}

.candidate-card {
  background: #fff;
  border: 1px solid #f0ddd9;
  border-radius: 20px;
  padding: 18px;
  margin-top: 16px;
}

.candidate-card.recommended {
  border: 2px solid var(--accent);
  box-shadow: 0 6px 18px rgba(120, 80, 70, .08);
}

.candidate-label {
  display: inline-block;
  background: var(--main);
  color: #fff;
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 10px;
}

.candidate-label.sub { background: #b99a92; }

.product-name {
  font-size: 20px;
  color: #5a403a;
  font-weight: bold;
  margin-bottom: 10px;
}

.tag {
  display: inline-block;
  background: var(--soft-pink);
  color: var(--main-dark);
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold;
  margin: 4px 3px 6px 0;
}

.spec-list {
  background: #fff8f5;
  border-radius: 16px;
  padding: 14px;
  margin-top: 12px;
  border: 1px solid #f0ddd9;
}

.spec-row {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  border-bottom: 1px solid #f0ddd9;
  padding: 8px 0;
  font-size: 14px;
}

.spec-row:last-child { border-bottom: none; }
.spec-row span { color: #6b5852; }
.spec-row strong { color: #4a3b35; text-align: right; }

.result h3 {
  color: var(--main-dark);
  margin-top: 18px;
  margin-bottom: 8px;
  font-size: 17px;
}

.result ul {
  margin: 8px 0 0;
  padding-left: 20px;
}

.notice {
  margin-top: 16px;
  padding: 15px;
  border-radius: 16px;
  background: #fff;
  color: var(--sub);
  font-size: 14px;
}

.cta {
  display: block;
  text-align: center;
  margin-top: 18px;
  padding: 15px;
  background: var(--main);
  color: #fff;
  border-radius: 999px;
  font-weight: bold;
}

.reset-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 13px;
  background: #f1e9e6;
  color: #5a403a;
  border: none;
  border-radius: 999px;
  font-weight: bold;
  cursor: pointer;
}

.small-note {
  margin-top: 12px;
  font-size: 12px;
  color: #8a746d;
  text-align: center;
}

.photo-section, .link-section, .reserve-section {
  margin-top: 24px;
  padding: 20px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 22px;
}

.photo-section h3,
.link-section h3,
.reserve-section h3 {
  margin-top: 0;
  color: var(--main-dark);
  text-align: center;
}

.photo-box {
  border: 1px solid #f0ddd9;
  border-radius: 16px;
  background: #fff8f5;
  padding: 14px;
  margin-top: 14px;
}

.photo-box label {
  display: block;
  font-weight: bold;
  color: var(--main-dark);
  font-size: 13px;
  margin-bottom: 8px;
}

.photo-box input {
  width: 100%;
  font-size: 12px;
}

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
  max-height: 260px;
  object-fit: cover;
  border: 1px solid #f0ddd9;
}

.length-result {
  display: none;
  margin-top: 16px;
  background: #fff8f5;
  border: 1px solid #f0ddd9;
  border-radius: 18px;
  padding: 18px;
  text-align: center;
}

.length-result strong {
  display: block;
  font-size: 28px;
  color: var(--main);
  margin: 6px 0;
}

.photo-submit-btn, .insta-btn, .reserve-btn {
  display: block;
  width: 100%;
  margin-top: 14px;
  padding: 15px;
  border: none;
  border-radius: 999px;
  background: var(--main);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  text-align: center;
  text-decoration: none;
}

.photo-submit-btn:hover, .insta-btn:hover, .reserve-btn:hover { background: #80554e; }

.reserve-btn {
  background: #7b514a;
  line-height: 1.5;
}

.reserve-btn span {
  display: block;
  font-size: 12px;
  font-weight: normal;
  opacity: .9;
}

.final-cta {
  margin-top: 24px;
  padding: 18px;
  border-radius: 22px;
  background: linear-gradient(135deg, #9b6b63, #7b514a);
  color: #fff;
  text-align: center;
  font-weight: bold;
}

.final-cta small {
  display: block;
  margin-top: 6px;
  font-weight: normal;
  opacity: .92;
}

@media (max-width: 520px) {
  body { padding: 14px; }
  .card { padding: 20px; }
  .hero h1 { font-size: 23px; }
  .question h2 { font-size: 17px; }
  .option-btn, .length-btn { font-size: 14px; }
  .product-name { font-size: 18px; }
  .spec-row { align-items: flex-start; font-size: 13px; }
}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <div class="hero">
      <h1>あなたに合うエクステ診断</h1>
      <p>
        シール？羽？毛質ランクまで、あなたの希望に合わせておすすめ候補を診断します♡<br>
        診断後に本数目安・スタイル・店舗予約まで確認できます。
      </p>
    </div>

    <div class="progress-wrap">
      <div class="progress-text">
        <span id="stepText">STEP 1 / 5</span>
        <span>約1分で診断</span>
      </div>
      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>
    </div>

    <div class="question active" data-max="1">
      <h2>Q1. 今の気分に一番近いのは？</h2>
      <p class="question-note">1つ選んでください</p>
      <button class="option-btn" data-type="A">一気に雰囲気を変えて、ロングヘアを楽しみたい</button>
      <button class="option-btn" data-type="C">エクステってバレないくらい自然にしたい</button>
      <button class="option-btn" data-type="A">夏休み・旅行・イベントだけ可愛く変わりたい</button>
      <button class="option-btn" data-type="D">前に失敗したから、今回はちゃんと選びたい</button>
    </div>

    <div class="question" data-max="2">
      <h2>Q2. エクステで心配なことは？</h2>
      <p class="question-note">最大2つまで選べます</p>
      <button class="option-btn" data-type="C">すぐ取れないか心配</button>
      <button class="option-btn" data-type="D">ちゃんと馴染むのか心配</button>
      <button class="option-btn" data-type="D">結んだ時に接合部が見えないか心配</button>
      <button class="option-btn" data-type="A">予算に収まるか心配</button>
    </div>

    <div class="question" data-max="1">
      <h2>Q3. どのくらい楽しみたい？</h2>
      <p class="question-note">1つ選んでください</p>
      <button class="option-btn" data-type="A">1ヶ月くらい楽しめたらOK</button>
      <button class="option-btn" data-type="B">1〜2ヶ月くらい綺麗に楽しみたい</button>
      <button class="option-btn" data-type="C">2〜3ヶ月しっかり楽しみたい</button>
      <button class="option-btn" data-type="D">外してまた使えるなら嬉しい</button>
    </div>

    <div class="question" data-max="2">
      <h2>Q4. 普段よくする髪型は？</h2>
      <p class="question-note">最大2つまで選べます</p>
      <button class="option-btn" data-type="A">下ろして過ごすことが多い</button>
      <button class="option-btn" data-type="C">巻き髪をよくする</button>
      <button class="option-btn" data-type="D">結ぶことが多い</button>
      <button class="option-btn" data-type="D">ヘアセットをよくする</button>
    </div>

    <div class="question" data-max="1">
      <h2>Q5. あなたに一番近い考え方は？</h2>
      <p class="question-note">1つ選んでください</p>
      <button class="option-btn" data-type="A">初めてだから、まずは試しやすいものがいい</button>
      <button class="option-btn" data-type="B">無理なく続けられて、仕上がりも綺麗なものがいい</button>
      <button class="option-btn" data-type="C">周りにバレにくい自然な仕上がりにしたい</button>
      <button class="option-btn" data-type="D">長く綺麗に使える、質の良いものを選びたい</button>
    </div>

    <div class="nav" id="navArea">
      <button class="back" onclick="prevQuestion()">← 戻る</button>
      <button class="next" onclick="nextQuestion()">次へ →</button>
    </div>

    <div id="result" class="result"></div>

  </div>
</div>

<script>
let current = 0;
let answers = [[], [], [], [], []];
let selectedLength = '';

const questions = document.querySelectorAll('.question');
const totalQuestions = questions.length;

const products = {
  A: {
    product: 'ロイヤルレミーシールエクステ',
    shortName: 'ロイヤルレミーシール',
    tags: ['初めての方におすすめ', '短期イメチェン向き', '試しやすい'],
    specs: {
      '毛質': '★★☆☆☆',
      '持ち': '★★☆☆☆（1ヶ月〜1.5ヶ月）',
      'コスパ': '★★★☆☆（1本270円）',
      'お手入れのしやすさ': '★★☆☆☆',
      '目立ちにくさ': '★★★☆☆'
    },
    reason: [
      'まずはエクステを試してみたい方に向いています。',
      'イベント・旅行・夏休みなど、期間を決めたイメチェンにおすすめです。',
      'シールエクステで雰囲気を変えたい方に選びやすいタイプです。'
    ],
    message: '「まずはロングヘアを楽しんでみたい」方におすすめです。'
  },

  B: {
    product: 'プレミアムレミーシールエクステ',
    shortName: 'プレミアムレミーシール',
    tags: ['バランス重視', '続けやすい', '仕上がりも綺麗'],
    specs: {
      '毛質': '★★★☆☆',
      '持ち': '★★★☆☆（1.5ヶ月〜2ヶ月）',
      'コスパ': '★★★☆☆（1本370円）',
      'お手入れのしやすさ': '★★★☆☆',
      '目立ちにくさ': '★★★☆☆'
    },
    reason: [
      '毛質・持ち・お手入れのしやすさのバランスを大切にしたい方に向いています。',
      '初めての方にも、リピートの方にも提案しやすい標準バランス型です。',
      '無理なく続けながら、綺麗な仕上がりも求めたい方におすすめです。'
    ],
    message: '「続けやすさと仕上がりの綺麗さ、どちらも大切にしたい」方におすすめです。'
  },

  C: {
    product: 'バージンレミーシールエクステ',
    shortName: 'バージンレミーシール',
    tags: ['毛質重視', '自然な仕上がり', '綺麗に馴染ませたい方へ'],
    specs: {
      '毛質': '★★★★☆',
      '持ち': '★★★★☆（2ヶ月〜2.5ヶ月）',
      'コスパ': '★★★★☆（1本460円）',
      'お手入れのしやすさ': '★★★★☆',
      '目立ちにくさ': '★★★☆☆'
    },
    reason: [
      '自然な馴染みや毛先の綺麗さを重視する方に向いています。',
      '毛質・持ち・お手入れのしやすさをバランス良く高めたい方におすすめです。',
      'シールエクステの中でも、仕上がりの質感を大切にしたい方に選びやすいタイプです。'
    ],
    message: '「シールエクステでも毛質や綺麗な仕上がりにこだわりたい」方におすすめです。'
  },

  D: {
    product: '【無加工毛エクステ】ダブル羽エクステ',
    shortName: 'ダブル羽エクステ',
    tags: ['最高ランク毛質', '長く綺麗に使える', '目立ちにくさ重視'],
    specs: {
      '毛質': '★★★★★',
      '持ち': '★★★★★（約1年 ※1〜2ヶ月ごとに付け替え時）',
      'コスパ': '★★★★★（1束2本付650円〜690円）',
      'お手入れのしやすさ': '★★★★☆',
      '目立ちにくさ': '★★★★★'
    },
    reason: [
      '毛質・持ち・自然さをしっかり重視したい方に向いています。',
      '外してまた使いたい方や、長く綺麗に楽しみたい方におすすめです。',
      '接合部の目立ちにくさや、地毛のような馴染みを大切にしたい方に選びやすいタイプです。'
    ],
    message: '「せっかくつけるなら、質の良いものを長く綺麗に使いたい」方におすすめです。'
  }
};

const lengthGuides = {
  short: {
    label: 'ショート',
    count: '120本〜',
    note: 'ショートは地毛との段差が出やすいため、自然に馴染ませるには多めの本数が目安です。'
  },
  bob: {
    label: 'ボブ',
    count: '100本〜',
    note: 'ボブは毛先に厚みが出やすいため、自然なロングに見せるにはしっかり本数を入れるのが目安です。'
  },
  medium: {
    label: 'ミディアム',
    count: '80本〜',
    note: 'ミディアムは長さ出しと毛先の厚み調整を両方見ながら本数を決めるのが目安です。'
  },
  long: {
    label: 'ロング',
    count: '60本〜',
    note: 'ロングは長さよりも毛先の厚み・ボリューム調整を中心に本数を決めるのが目安です。'
  }
};

document.querySelectorAll('.option-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const questionIndex = [...questions].findIndex(q => q.contains(btn));
    const question = questions[questionIndex];
    const maxSelect = Number(question.dataset.max);
    const selectedButtons = question.querySelectorAll('.option-btn.selected');

    if (maxSelect === 1) {
      question.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[questionIndex] = [btn.dataset.type];
      return;
    }

    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
    } else {
      if (selectedButtons.length >= maxSelect) {
        alert('この質問は最大' + maxSelect + 'つまで選べます♡');
        return;
      }
      btn.classList.add('selected');
    }

    answers[questionIndex] = [...question.querySelectorAll('.option-btn.selected')].map(b => b.dataset.type);
  });
});

function update() {
  questions.forEach((q, i) => q.classList.toggle('active', i === current));
  document.getElementById('bar').style.width = ((current + 1) / totalQuestions * 100) + '%';
  document.getElementById('stepText').textContent = 'STEP ' + (current + 1) + ' / ' + totalQuestions;

  const nextBtn = document.querySelector('.next');
  nextBtn.textContent = current === totalQuestions - 1 ? 'おすすめ候補を見る' : '次へ →';
}

function prevQuestion() {
  if (current > 0) {
    current--;
    update();
  }
}

function nextQuestion() {
  if (answers[current].length === 0) {
    alert('選択してください♡');
    return;
  }

  if (current < totalQuestions - 1) {
    current++;
    update();
    return;
  }

  showResult();
}

function getTopNonWingType(score) {
  let topType = 'A';
  ['A', 'B', 'C'].forEach(type => {
    if (score[type] > score[topType]) topType = type;
  });
  return topType;
}

function showResult() {
  const score = { A: 0, B: 0, C: 0, D: 0 };

  answers.forEach(answerGroup => {
    answerGroup.forEach(type => {
      score[type]++;
    });
  });

  const sheetType = getTopNonWingType(score);
  const sheetProduct = products[sheetType];
  const wingProduct = products.D;

  renderTwoCandidates(sheetProduct, wingProduct, sheetType);
}

function createSpecHtml(specs) {
  return Object.keys(specs).map(key => `
    <div class="spec-row">
      <span>${key}</span>
      <strong>${specs[key]}</strong>
    </div>
  `).join('');
}

function createTagHtml(tags) {
  return tags.map(tag => `<span class="tag">${tag}</span>`).join('');
}

function createReasonHtml(reason) {
  return reason.map(text => `<li>${text}</li>`).join('');
}

function renderCandidate(data, label, isRecommended) {
  return `
    <div class="candidate-card ${isRecommended ? 'recommended' : ''}">
      <div class="candidate-label ${isRecommended ? '' : 'sub'}">${label}</div>
      <div class="product-name">${data.product}</div>
      <div class="tags">${createTagHtml(data.tags)}</div>
      <div class="spec-list">${createSpecHtml(data.specs)}</div>
      <h3>おすすめポイント</h3>

function setupPhotoPreview() {
  const input = document.getElementById('hairPhoto');
  const preview = document.getElementById('hairPhotoPreview');

  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
}

function setupLengthButtons() {
  document.querySelectorAll('.length-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedLength = btn.dataset.length;
    });
  });
}

function showLengthGuide() {
  if (!selectedLength) {
    alert('今の髪の長さを選択してください♡');
    return;
  }

  const guide = lengthGuides[selectedLength];
  const resultBox = document.getElementById('lengthResult');

  resultBox.style.display = 'block';
  resultBox.innerHTML = `
    <div class="result-label">必要取付本数の目安</div>
    <div>${guide.label}の方は</div>
    <strong>${guide.count}</strong>
    <div>${guide.note}</div>
    <div class="small-note">
      ※こちらはあくまでも目安です。<br>
      ※長さだけでなく、毛量・毛質・地毛の厚み・希望の仕上がりによって必要本数は変動します。<br>
      ※最終的な本数は、写真とカウンセリング内容を確認したうえでご提案します。
    </div>
  `;

  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetDiagnosis() {
  current = 0;
  answers = [[], [], [], [], []];
  selectedLength = '';

  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));

  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('navArea').style.display = 'flex';

  update();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

update();
